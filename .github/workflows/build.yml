name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git libffi-dev libssl-dev python3-dev python3-pip python3-setuptools unzip zip zlib1g-dev openjdk-17-jdk libtool pkg-config autoconf libncurses5-dev libncursesw5-dev libtinfo5 cmake libgmp-dev libmpfr-dev libmpc-dev

    - name: Install Buildozer and Dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer Cython virtualenv

    - name: Build Android APK
      run: |
        buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: dps-downloade    r-apk
        path: bin/*.apk    
